version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus_db
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_db"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: change-this-in-production
      DEBUG: "False"
      DB_ENGINE: postgresql
      DB_NAME: nexus_db
      DB_USER: nexus_user
      DB_PASSWORD: nexus_pass
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python seed_data.py &&
             gunicorn nexus.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: change-this-in-production
      DEBUG: "False"
      DB_ENGINE: postgresql
      DB_NAME: nexus_db
      DB_USER: nexus_user
      DB_PASSWORD: nexus_pass
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
    command: celery -A nexus worker -l info --concurrency 2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: change-this-in-production
      DB_ENGINE: postgresql
      DB_NAME: nexus_db
      DB_USER: nexus_user
      DB_PASSWORD: nexus_pass
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A nexus beat -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_files:
  static_files:
